<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelCompanion Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    body, html { font-family: 'SF Pro Display', 'Roboto', Arial, sans-serif; }
    ::-webkit-scrollbar { display: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .glass { backdrop-filter: blur(16px) saturate(180%); background-color: rgba(255,255,255,0.25); border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.18); }
    .glass-dark { backdrop-filter: blur(16px) saturate(160%); background: rgba(18,31,61,0.55); border-radius: 1.5rem; border: 1px solid rgba(92,225,230,0.10); }
  </style>
</head>
<body class="bg-white dark:bg-[#121F3D] text-gray-900 dark:text-white transition-colors duration-500">

  <!-- Splash Screen -->
  <section id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center h-[100vh] w-full bg-white dark:bg-[#121F3D] transition-colors duration-500">
    <!-- Animated Logo Container -->
    <div id="splash-logo-container" class="flex flex-col items-center justify-center space-y-6">
      <div class="relative w-28 h-28 flex items-center justify-center">
        <!-- Ocean Blue + Aqua Glass Morphism Circle -->
        <div class="absolute inset-0 rounded-full glass dark:glass-dark shadow-xl"></div>
        <!-- Wave Animation SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" id="splash-waves" class="absolute inset-0 w-full h-full" viewBox="0 0 112 112" fill="none">
          <path id="wave1" d="M16,80 Q56,40 96,80" stroke="#1A73E8" stroke-width="4" fill="none" opacity="0.85"/>
          <path id="wave2" d="M22,88 Q56,56 90,88" stroke="#5CE1E6" stroke-width="3" fill="none" opacity="0.65"/>
          <path id="wave3" d="M32,98 Q56,76 80,98" stroke="#FF7A5A" stroke-width="2" fill="none" opacity="0.40"/>
        </svg>
        <!-- Paper Plane Icon -->
        <div class="absolute inset-0 flex items-center justify-center">
          <i class="fa-solid fa-paper-plane text-4xl text-[#1A73E8] dark:text-[#5CE1E6] transition-all duration-700" id="plane-icon"></i>
        </div>
      </div>
      <div class="flex flex-col items-center">
        <span class="text-2xl font-bold tracking-tight" style="font-family:'SF Pro Display', 'Roboto', sans-serif;">TravelCompanion</span>
        <span class="text-base text-gray-400 dark:text-gray-300 mt-1">AI-powered Travel, Just for You</span>
      </div>
    </div>
    <!-- Loading Dots Animation -->
    <div id="splash-loading-dots" class="flex space-x-1 mt-8">
      <span class="block w-2.5 h-2.5 rounded-full bg-[#1A73E8] dark:bg-[#5CE1E6] animate-bounce" style="animation-delay:0s"></span>
      <span class="block w-2.5 h-2.5 rounded-full bg-[#FF7A5A] dark:bg-[#5CE1E6]/70 animate-bounce" style="animation-delay:0.15s"></span>
      <span class="block w-2.5 h-2.5 rounded-full bg-[#5CE1E6] dark:bg-[#FF7A5A]/80 animate-bounce" style="animation-delay:0.3s"></span>
    </div>
    <script>
      // Animate the plane icon "flying" up after a short delay
      setTimeout(() => {
        document.getElementById('plane-icon').classList.add('translate-y-[-16px]', 'scale-110');
      }, 500);
      // Animate the waves (SVG path) using CSS keyframes (hacky, but visible)
      const wave1 = document.getElementById('wave1');
      const wave2 = document.getElementById('wave2');
      const wave3 = document.getElementById('wave3');
      setTimeout(() => {
        wave1.style.strokeDasharray = wave1.getTotalLength();
        wave1.style.strokeDashoffset = wave1.getTotalLength();
        wave1.style.transition = "stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1)";
        wave1.style.strokeDashoffset = "0";
        wave2.style.strokeDasharray = wave2.getTotalLength();
        wave2.style.strokeDashoffset = wave2.getTotalLength();
        wave2.style.transition = "stroke-dashoffset 1.6s cubic-bezier(0.4,0,0.2,1)";
        wave2.style.strokeDashoffset = "0";
        wave3.style.strokeDasharray = wave3.getTotalLength();
        wave3.style.strokeDashoffset = wave3.getTotalLength();
        wave3.style.transition = "stroke-dashoffset 2.1s cubic-bezier(0.4,0,0.2,1)";
        wave3.style.strokeDashoffset = "0";
      }, 180);
      // Splash auto-dismiss (simulate navigation to Home)
      setTimeout(() => {
        document.getElementById('splash-screen').classList.add('opacity-0', 'pointer-events-none');
        setTimeout(() => {
          document.getElementById('splash-screen').style.display = 'none';
          showScreen('home-screen');
        }, 500);
      }, 2850);
    </script>
  </section>

  <!-- Home Screen -->
  <section id="home-screen" style="display:none;">
    <section id="app-wrapper" class="bg-gray-100 dark:bg-gray-900 min-h-[100vh] font-['Inter'] text-gray-900 dark:text-white">
      <!-- Status Bar -->
      <div id="status-bar" class="flex justify-between items-center px-4 bg-white dark:bg-[#121F3D] fixed top-0 left-0 right-0 z-50" style="height:44px;">
        <div class="text-sm font-medium">9:20 AM</div>
        <div class="flex items-center space-x-1">
          <i class="fa-solid fa-signal"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-battery-three-quarters"></i>
        </div>
      </div>
      <!-- Header -->
      <header id="header" class="fixed top-[44px] left-0 right-0 z-40 bg-white dark:bg-[#121F3D] shadow-sm px-4 py-3">
        <div class="flex justify-between items-center">
          <div>
            <a href="home.html" class="flex items-center">
              <span class="text-2xl font-bold tracking-tight" style="font-family:'SF Pro Display', 'Roboto', sans-serif;">TravelCompanion</span>
            </a>
            <h1 class="text-xl font-semibold">Hello, Alex</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 flex items-center">
              <i class="fa-solid fa-location-dot mr-1 text-[#FF7A5A] dark:text-[#5CE1E6]"></i>
              San Francisco, CA
            </p>
          </div>
          <div class="flex items-center space-x-3">
            <button class="p-2 rounded-full bg-gray-100 dark:bg-gray-800">
              <i class="fa-solid fa-bell text-[#1A73E8] dark:text-[#5CE1E6]"></i>
            </button>
            <a href="profile.html" class="h-10 w-10 rounded-full overflow-hidden block">
              <img src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-3.jpg" alt="Profile" class="h-full w-full object-cover" />
            </a>
            <!-- Live Preview Button -->
            <button id="live-preview-btn" class="ml-2 px-4 py-2 rounded-lg bg-[#1A73E8] dark:bg-[#5CE1E6] text-white dark:text-[#121F3D] text-sm font-semibold shadow transition hover:bg-[#1558b0] dark:hover:bg-[#3fd8e6]">Live Preview</button>
          </div>
        </div>
      </header>
      <!-- ... (rest of home.html main content goes here) ... -->
    </section>
  </section>

  <!-- Itinerary Screen -->
  <section id="itinerary-screen" style="display:none;">
    <!-- Full main content from itinerary.html (lines 401-759) goes here, excluding <html>, <head>, <body>, duplicate scripts/styles, and navigation reloads. -->
    <!-- ...copied content... -->
  </section>

  <!-- Explore Screen -->
  <section id="explore-screen" style="display:none;">
    <!-- Full main content from explore.html (lines 201-757) goes here, excluding <html>, <head>, <body>, duplicate scripts/styles, and navigation reloads. -->
    <!-- ...copied content... -->
  </section>

  <!-- Bookings Screen -->
  <section id="bookings-screen" style="display:none;">
    <!-- Full main content from bookings.html (lines 201-833) goes here, excluding <html>, <head>, <body>, duplicate scripts/styles, and navigation reloads. -->
    <!-- ...copied content... -->
  </section>

  <!-- Profile Screen -->
  <section id="profile-screen" style="display:none;">
    <!-- Full main content from profile.html (lines 201-845) goes here, excluding <html>, <head>, <body>, duplicate scripts/styles, and navigation reloads. -->
    <!-- ...copied content... -->
  </section>

  <!-- Budget Screen -->
  <section id="budget-screen" style="display:none;">
    <!-- Full main content from budget.html (lines 201-689) goes here, excluding <html>, <head>, <body>, duplicate scripts/styles, and navigation reloads. -->
    <!-- ...copied content... -->
  </section>

  <script>
    // SPA navigation logic
    function showScreen(screenId) {
      document.querySelectorAll('section').forEach(sec => sec.style.display = 'none');
      document.getElementById(screenId).style.display = '';
    }
    // After splash animation, show home screen
    setTimeout(() => {
      document.getElementById('splash-screen').classList.add('opacity-0', 'pointer-events-none');
      setTimeout(() => {
        document.getElementById('splash-screen').style.display = 'none';
        showScreen('home-screen');
      }, 500);
    }, 2850);

    // Navigation for bottom nav and other buttons
    document.addEventListener('DOMContentLoaded', function() {
      // Replace all <a href="home.html"> with SPA navigation
      document.querySelectorAll('a[href="home.html"]').forEach(el => {
        el.addEventListener('click', function(e) {
          e.preventDefault();
          showScreen('home-screen');
        });
      });
      document.querySelectorAll('a[href="itinerary.html"]').forEach(el => {
        el.addEventListener('click', function(e) {
          e.preventDefault();
          showScreen('itinerary-screen');
        });
      });
      document.querySelectorAll('a[href="explore.html"]').forEach(el => {
        el.addEventListener('click', function(e) {
          e.preventDefault();
          showScreen('explore-screen');
        });
      });
      document.querySelectorAll('a[href="bookings.html"]').forEach(el => {
        el.addEventListener('click', function(e) {
          e.preventDefault();
          showScreen('bookings-screen');
        });
      });
      document.querySelectorAll('a[href="profile.html"]').forEach(el => {
        el.addEventListener('click', function(e) {
          e.preventDefault();
          showScreen('profile-screen');
        });
      });
      document.querySelectorAll('a[href="budget.html"]').forEach(el => {
        el.addEventListener('click', function(e) {
          e.preventDefault();
          showScreen('budget-screen');
        });
      });
      // Add more as needed for other screens (explore, bookings, profile, etc.)
    });
  </script>
</body>
</html>
