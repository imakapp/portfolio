<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Timer functionality
    let seconds = 0;
    let minutes = 0;
    let timerInterval;
    const timerDisplay = document.getElementById('timer-display');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const stopBtn = document.getElementById('stop-btn');
    
    function startTimer() {
      timerInterval = setInterval(function() {
        seconds++;
        if (seconds >= 60) {
          seconds = 0;
          minutes++;
        }
        updateTimerDisplay();
      }, 1000);
      playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    }
    
    function pauseTimer() {
      clearInterval(timerInterval);
      playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
    }
    
    function resetTimer() {
      clearInterval(timerInterval);
      seconds = 0;
      minutes = 0;
      updateTimerDisplay();
      playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
    }
    
    function updateTimerDisplay() {
      const formattedMinutes = String(minutes).padStart(2, '0');
      const formattedSeconds = String(seconds).padStart(2, '0');
      timerDisplay.textContent = `${formattedMinutes}:${formattedSeconds}`;
    }
    
    // Initialize timer display
    updateTimerDisplay();
    
    // Play/Pause button functionality
    let isPlaying = false;
    playPauseBtn.addEventListener('click', function() {
      isPlaying = !isPlaying;
      if (isPlaying) {
        startTimer();
      } else {
        pauseTimer();
      }
    });
    
    // Stop button functionality
    stopBtn.addEventListener('click', function() {
      resetTimer();
      isPlaying = false;
    });
    
    // Complete workout button
    const completeBtn = document.getElementById('complete-workout-btn');
    completeBtn.addEventListener('click', function() {
      this.classList.add('scale-95');
      setTimeout(() => {
        this.classList.remove('scale-95');
        // Navigate back to workout details or to a summary page
        window.location.href = 'WorkoutDetails.html';
      }, 200);
    });
    
    // Exercise navigation buttons
    const prevExerciseBtn = document.getElementById('prev-exercise-btn');
    const nextExerciseBtn = document.getElementById('next-exercise-btn');
    
    prevExerciseBtn.addEventListener('click', function() {
      this.classList.add('scale-95');
      setTimeout(() => {
        this.classList.remove('scale-95');
        // Would navigate to previous exercise in a real app
        console.log('Previous exercise');
      }, 150);
    });
    
    nextExerciseBtn.addEventListener('click', function() {
      this.classList.add('scale-95');
      setTimeout(() => {
        this.classList.remove('scale-95');
        // Would navigate to next exercise in a real app
        console.log('Next exercise');
      }, 150);
    });
    
    // Close button
    const closeBtn = document.getElementById('close-session-btn');
    closeBtn.addEventListener('click', function() {
      // Ask for confirmation before closing workout session
      if (confirm('Are you sure you want to exit this workout?')) {
        window.location.href = 'WorkoutDetails.html';
      }
    });
  });
</script>
