<script>
  document.addEventListener('DOMContentLoaded', function() {
    // FAB button functionality
    const fab = document.getElementById('floating-action-button').querySelector('button');
    if (fab) {
      fab.addEventListener('click', function() {
        // Show create post modal or navigate to create post screen
        console.log('Create post clicked');
      });
    }
    
    // Add tap effect to bottom navigation
    const navLinks = document.querySelectorAll('.nav-link');
    navLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault(); // Prevent the default link behavior
        
        // Get the target screen
        const targetScreen = this.getAttribute('data-target');
        
        // Handle navigation in parent window if inside iframe
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({
            action: 'navigate',
            target: targetScreen
          }, '*');
        } else {
          // If navigation to another screen, redirect to the appropriate HTML file
          if (targetScreen === 'dashboard') {
            window.location.href = 'Dashboard.html';
          } else if (targetScreen === 'workouts') {
            window.location.href = 'WorkoutDetails.html';
          } else if (targetScreen === 'nutrition') {
            window.location.href = 'Nutrition.html';
          } else if (targetScreen === 'progress') {
            window.location.href = 'Progress.html';
          } else if (targetScreen === 'community') {
            // Already on Community screen
          }
        }
        
        // Reset all buttons to inactive state
        navLinks.forEach(btn => {
          btn.querySelector('i').classList.add('text-gray-500');
          btn.querySelector('i').classList.remove('text-[#6191FF]');
          btn.querySelector('span').classList.add('text-gray-500');
          btn.querySelector('span').classList.remove('text-[#6191FF]', 'font-medium');
        });
        
        // Set clicked button to active state
        this.querySelector('i').classList.remove('text-gray-500');
        this.querySelector('i').classList.add('text-[#6191FF]');
        this.querySelector('span').classList.remove('text-gray-500');
        this.querySelector('span').classList.add('text-[#6191FF]', 'font-medium');
      });
    });
  });
</script>
